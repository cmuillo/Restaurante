server {
    listen 80;

    # Admin panel
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # POS
    location /pos/ {
        alias /usr/share/nginx/html/pos/;
        try_files $uri $uri/ /pos/index.html;
    }

    # Kitchen KDS
    location /kitchen/ {
        alias /usr/share/nginx/html/kitchen/;
        try_files $uri $uri/ /kitchen/index.html;
    }

    # Kiosco
    location /kiosk/ {
        alias /usr/share/nginx/html/kiosk/;
        try_files $uri $uri/ /kiosk/index.html;
    }

    # Redirigir raíz a admin
    location = / {
        return 301 /admin/;
    }

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
